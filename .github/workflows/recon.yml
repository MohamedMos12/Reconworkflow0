name: Canva Recon Workflow

on:
  workflow_dispatch: # تشغيل يدوي

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Go & httpx
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - run: go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest

      - name: Install Dependencies
        run: |
          pip install requests urllib3
          # تحميل EvilWAF إذا لم تكن موجودة
          if [ ! -d "evilwaf" ]; then
            git clone https://github.com/m8sec/evilwaf.git
          fi
          cd evilwaf && pip install -r requirements.txt

      - name: Run EvilWAF Hunt
        run: |
          # تشغيل الأداة وتحويل المخرجات لملف
          python3 evilwaf/evilwaf.py -t https://canva.com --auto-hunt > raw_output.txt
          # استخراج الـ IPs الفريدة
          grep -E -o "([0-9]{1,3}[\.]){3}[0-9]{1,3}" raw_output.txt | sort -u > ips.txt
          echo "Found $(wc -l < ips.txt) unique IPs"

      - name: Advanced Cross-Match Scan (Bypass Check)
        run: |
          mkdir -p results
          # استخدام httpx لعمل فحص ذكي (Host Header + SNI)
          # سنقوم بإنشاء قائمة "IP:Port" للفحص
          for ip in $(cat ips.txt); do
            for sub in $(cat subs.txt); do
              # فحص HTTP و HTTPS مع SNI وتجاهل أخطاء الشهادة
              echo "$ip" | ~/go/bin/httpx -H "Host: $sub" -status-code -title -location -silent -content-length -follow-redirects -p 80,443 >> results/all_scans.txt
            done
          done

      - name: Filter Potential Bypasses
        run: |
          # استخراج النتائج التي تعطي 200 أو 302 (مثل Okta)
          grep -E "\[200\]|\[302\]" results/all_scans.txt > results/potential_bypasses.txt || true

      - name: Upload Results
        uses: actions/upload-artifact@v3
        with:
          name: recon-results
          path: results/
