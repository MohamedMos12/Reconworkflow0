name: Canva Recon Optimized

on:
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Go & Tools
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: |
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          # إضافة nuclei للفحص التلقائي للثغرات بعد الكشف
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Install Python Dependencies
        run: |
          pip install requests urllib3
          if [ ! -d "evilwaf" ]; then git clone https://github.com/m8sec/evilwaf.git; fi
          cd evilwaf && pip install -r requirements.txt

      - name: Hunt Origin IPs
        run: |
          python3 evilwaf/evilwaf.py -t https://canva.com --auto-hunt > raw_output.txt
          # استخراج الـ IPs الفريدة فقط
          grep -E -o "([0-9]{1,3}[\.]){3}[0-9]{1,3}" raw_output.txt | sort -u > ips.txt
          echo "Total IPs to scan: $(wc -l < ips.txt)"

      - name: High-Speed Parallel Scan
        run: |
          mkdir -p results
          # استخدام xargs لتشغيل 20 عملية بالتوازي لسرعة خرافية
          # -P 20 تعني 20 Thread متوازي
          cat ips.txt | xargs -I % -P 20 sh -c "cat subs.txt | ~/go/bin/httpx -u https://% -H 'Host: {}' -sc -cl -title -location -silent -p 80,443 -t 50 -k >> results/all_scans.txt"

      - name: Filter and Categorize
        run: |
          # تصفية النتائج الناجحة فقط (200 OK أو تحويلات 3xx)
          grep -E "\[200\]|\[301\]|\[302\]" results/all_scans.txt > results/potential_bypasses.txt || true
          
          # استخراج الـ IPs التي أعطت 200 OK للفحص المعمق
          grep "\[200\]" results/potential_bypasses.txt | awk '{print $1}' | sort -u > results/live_origins.txt || true

      - name: Vulnerability Scan on Bypasses
        if: success()
        run: |
          # فحص الـ IPs الناجحة بـ Nuclei للبحث عن ثغرات حقيقية
          if [ -s results/live_origins.txt ]; then
            cat results/live_origins.txt | ~/go/bin/nuclei -t exposures/ -t vulnerabilities/ -o results/vulnerabilities.txt
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canva-bypass-report-${{ github.run_id }}
          path: results/
