name: Canva Recon Optimized

on:
workflow_dispatch:

jobs:
recon:
runs-on: ubuntu-latest

```
steps:

  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.9"

  - name: Setup Go
    uses: actions/setup-go@v5
    with:
      go-version: "1.21"

  - name: Install Recon Tools
    run: |
      go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
      go install github.com/projectdiscovery/httpx/cmd/httpx@latest
      go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

  - name: Install Python Tools
    run: |
      pip install requests urllib3
      git clone --depth 1 https://github.com/m8sec/evilwaf.git
      cd evilwaf
      pip install -r requirements.txt

  - name: Enumerate Subdomains
    run: |
      ~/go/bin/subfinder -d canva.com -silent > subs.txt
      echo "Total subdomains: $(wc -l < subs.txt)"

  - name: Probe Live Subdomains
    run: |
      mkdir -p results
      cat subs.txt | ~/go/bin/httpx -silent -sc -title -cl -location -o results/live_subs.txt

  - name: Hunt Origin IPs
    run: |
      python3 evilwaf/evilwaf.py -t https://canva.com --auto-hunt > raw_output.txt
      grep -E -o "([0-9]{1,3}[\.]){3}[0-9]{1,3}" raw_output.txt | sort -u > ips.txt
      echo "Origin IPs found: $(wc -l < ips.txt)"

  - name: Test Origin Bypass
    run: |
      mkdir -p results
      cat ips.txt | xargs -I % -P 20 sh -c "cat subs.txt | ~/go/bin/httpx -u https://% -H 'Host: {}' -sc -title -cl -location -silent -p 80,443 -t 50 -k >> results/origin_scans.txt"

  - name: Filter Successful Bypasses
    run: |
      grep -E "\[200\]|\[301\]|\[302\]" results/origin_scans.txt > results/potential_bypasses.txt || true
      grep "\[200\]" results/potential_bypasses.txt | awk '{print $1}' | sort -u > results/live_origins.txt || true

  - name: Run Nuclei Scan
    run: |
      if [ -s results/live_origins.txt ]; then
        cat results/live_origins.txt | ~/go/bin/nuclei -t exposures/ -t vulnerabilities/ -o results/vulnerabilities.txt
      fi

  - name: Upload Results
    uses: actions/upload-artifact@v4
    with:
      name: canva-recon-results-${{ github.run_id }}
      path: results
```
